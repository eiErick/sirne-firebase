<lib-header
  (back)="back()"
  [activeIcon]="false"
  [activeBack]="true"
  [activeKiam]="false"
  title="AVATAR"
/>

<div class="container">
  <div class="container__icons">
    @for (avatar of avatars; track $index) {
      <img
        [src]="avatar"
        (click)="selectAvatar(avatar)"
        [ngClass]="{ select: auth().icon === avatar }"
      />
    }

    <a
      class="icon-credit"
      target="_blank"
      href="https://www.flaticon.com/free-icons/animals"
      title="animals icons"
      >Animals icons created by Freepik - Flaticon</a
    >
  </div>
</div>
