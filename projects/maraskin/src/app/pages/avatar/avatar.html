<lib-header
  (back)="back()"
  [activeIcon]="false"
  [activeBack]="true"
  [activeKiam]="false"
  title="AVATAR"
/>

<div class="container">
  <lib-random-avatar
    class="random"
    [randomValue]="auth().randomIcon"
    (change)="avatarRandom($event)"
  ></lib-random-avatar>

  <div class="container__icons">
    @for (avatar of avatars; track $index) {
    <img
      [src]="avatar"
      (click)="selectAvatar(avatar)"
      [ngClass]="{ select: auth().icon === avatar }"
    />
    }

    <div class="myAvatar">
      <lib-my-avatar (change)="selectAvatar($event)"></lib-my-avatar>
    </div>

    <a
      class="icon-credit"
      target="_blank"
      href="https://www.flaticon.com/free-icons/animals"
      title="animals icons"
      >Animals icons created by Freepik - Flaticon</a
    >
  </div>
</div>
