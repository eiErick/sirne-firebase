<lib-header title="Maraskin" (settings)="openSettings()" />

<div class="container">
  @for (menu of menus; track $index) {
    <app-card
        [lunches]="lunches()"
        [menu]="menu"
        [snacks]="snacks()"
        (changedMenu)="changeMenu($event)"
        (addSnack)="addMealToMenu($event, menu.day, 'snack')"
        (addLunch)="addMealToMenu($event, menu.day, 'lunch')"
        (removedSnack)="removeMealToMenu($event, menu.day, 'snack')"
        (removedLunch)="removeMealToMenu($event, menu.day, 'lunch')"
        (changedMenu)="changeMenu($event)"
    />
}
